<!DOCTYPE html>
<html>
<head>
  <title>server ♡ soulmates</title>
</head>
<body style="background:pink; text-align:center; padding-top:50px">

  <h1>server ♡ soulmates</h1>
  <p>A half-blind Valentine’s match 💘</p>

  <form action="/submit" method="POST">
    <input name="name" placeholder="Your name" required><br><br>

    <select name="gender" required>
      <option value="">Your gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="nonbinary">Non-binary</option>
    </select><br><br>

    <select name="preference" required>
      <option value="">You’re looking for…</option>
      <option value="male">Men</option>
      <option value="female">Women</option>
      <option value="any">Anyone</option>
    </select><br><br>

    <button type="submit">Find my soulmate ♡</button>
  </form>

</body>
</html>
