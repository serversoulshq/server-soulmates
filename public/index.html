<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>server ♡ soulmates</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ffafbd, #ffc3a0);
      font-family: "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      padding: 30px 40px;
      border-radius: 16px;
      width: 320px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      text-align: center;
    }

    h1 {
      margin-bottom: 5px;
    }

    p {
      margin-top: 0;
      color: #555;
      font-size: 14px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      background: #ff5e8e;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      font-size: 15px;
    }

    button:hover {
      background: #ff3f78;
    }

    .heart {
      font-size: 24px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="heart">♡</div>
    <h1>server ♡ soulmates</h1>
    <p>a half-blind valentine’s match</p>

    <form action="/submit" method="POST">
      <input name="name" placeholder="Your name" required>

      <select name="gender" required>
        <option value="">Your gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="nonbinary">Non-binary</option>
      </select>

      <select name="preference" required>
        <option value="">Looking for…</option>
        <option value="male">Men</option>
        <option value="female">Women</option>
        <option value="any">Anyone</option>
      </select>

      <button type="submit">Find my soulmate ♡</button>
    </form>
  </div>
</body>
</html>
